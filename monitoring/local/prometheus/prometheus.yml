# =============================================================
# 로컬 테스트용 Prometheus 설정
# Spring Boot Actuator 메트릭 스크래핑 전용
# =============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ----- Prometheus 자체 메트릭 -----
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ----- Spring Boot Actuator (로컬) -----
  # host.docker.internal: Docker 컨테이너에서 호스트 머신 접근
  # Spring Boot가 localhost:8080에서 실행 중이어야 함
  - job_name: "spring-boot"
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets: ["host.docker.internal:9090"]
        labels:
          instance: "springboot-local"
