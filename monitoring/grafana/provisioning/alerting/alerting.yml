# =============================================================
# Grafana 알림 프로비저닝 (자동 설정)
# 역할: ERROR 로그 발생 시 Slack 웹훅으로 알림 전송
# 구성: Contact Point + Notification Policy + Alert Rule
# =============================================================

apiVersion: 1

# ═══════════════════════════════════════════════════════════
# ① Contact Point: Slack 웹훅
# Grafana가 알림을 보낼 대상 (Slack 채널)
# ═══════════════════════════════════════════════════════════
contactPoints:
  - orgId: 1
    name: Slack Alerts
    receivers:
      - uid: slack-error-webhook
        type: slack
        settings:
          # Slack Incoming Webhook URL
          url: $SLACK_WEBHOOK_URL
          # 알림을 보낼 Slack 채널
          recipient: "#알림-에러"
          # Slack 메시지 제목
          title: |
            {{ if eq .Status "firing" }}🚨 ERROR 로그 발생{{ else }}✅ 정상 복구{{ end }}
          # Slack 메시지 본문 (Go template)
          # firing: 에러 내용 + 시작 시각 표시
          # resolved: 복구 확인 + 지속 시간 표시
          text: |
            {{ range .Alerts }}
            *상태*: {{ .Status }}
            *알림*: {{ .Labels.alertname }}
            {{ if eq .Status "firing" }}*에러 내용*: {{ .Annotations.summary }}
            *시작*: {{ .StartsAt.Format "2006-01-02 15:04:05" }}{{ else }}*요약*: ERROR 로그가 더 이상 발생하지 않습니다.
            *발생*: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
            *복구*: {{ .EndsAt.Format "2006-01-02 15:04:05" }}{{ end }}
            {{ if .Annotations.log_query }}*Grafana 로그 쿼리*: `{{ .Annotations.log_query }}`{{ end }}
            {{ if .Annotations.dashboard_url }}👉 <{{ .Annotations.dashboard_url }}|Grafana에서 확인>{{ end }}
            ---
            {{ end }}

# ═══════════════════════════════════════════════════════════
# ② Notification Policy: 알림 라우팅
# 모든 알림을 Slack으로 라우팅
# ═══════════════════════════════════════════════════════════
policies:
  - orgId: 1
    # 기본 수신자: 위에서 정의한 Slack Contact Point
    receiver: Slack Alerts
    # 알림 그룹핑 기준 (같은 alertname은 하나로 묶음)
    group_by:
      - grafana_folder
      - alertname
    # 같은 그룹의 첫 알림 대기 시간 (30초간 모아서 한 번에 발송)
    group_wait: 30s
    # 같은 그룹에 새 알림 추가 시 재발송 간격
    group_interval: 5m
    # 동일 알림 반복 발송 간격 (알림 피로 방지)
    repeat_interval: 1h

# ═══════════════════════════════════════════════════════════
# ③ Alert Rule: Loki ERROR 로그 감지
# LogQL로 ERROR 레벨 로그 발생 여부를 1분마다 평가
# ═══════════════════════════════════════════════════════════
groups:
  - orgId: 1
    name: error-log-alerts
    folder: Q-Asker Alerts
    # 평가 주기: 1분마다 Loki에 쿼리 실행
    interval: 1m
    rules:
      - uid: loki-error-log-alert
        title: ERROR 로그 발생
        # 평가 조건: refId B (Threshold)의 결과를 사용
        condition: B
        data:
          # A: Loki에서 최근 1분간 ERROR 로그를 에러 유형별로 집계
          # Spring Boot 3.x 로그 포맷: "timestamp ERROR pid --- [thread] logger : [태그] 설명 key=value"
          #
          # 처리 흐름:
          #   1) regexp: 로그 메시지에서 ": " 뒤 80자를 error_msg로 추출
          #   2) label_format: error_msg에서 key=value 변수 부분 제거 (regexReplaceAll)
          #      예: "[멱등성키 중복] 문제 생성 실패 questionId=42" → "[멱등성키 중복] 문제 생성 실패"
          #   → 같은 유형의 에러는 ID가 달라도 하나의 알림으로 그룹핑됨
          #
          # 로그 작성 규칙: log.error("[분류 태그] 행위 + 원인 key={}", value, exception)
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: P8E80F9AEF21F6940
            model:
              refId: A
              expr: "sum by (error_msg) (count_over_time({level=\"ERROR\"} | regexp `---\\s+\\[.*?\\]\\s+\\S+\\s+:\\s+(?P<error_msg>.{1,80})` | label_format error_msg=`{{ regexReplaceAll \"\\\\s+\\\\w+=.*\" .error_msg \"\" }}` [1m]))"
              queryType: range
          # B: A의 결과가 0보다 크면 알림 발동 (Threshold 조건)
          - refId: B
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: "__expr__"
            model:
              refId: B
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
        # 데이터 없음 = 정상 (ERROR 로그가 없는 것이 정상 상태)
        # NoData를 Alerting으로 처리하면 에러가 없어도 알림 발생
        noDataState: OK
        # 즉시 발동 (Pending 없이 바로 Firing)
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.error_msg }}"
          log_query: "{level=\"ERROR\"}"
          dashboard_url: "https://mon.q-asker.com/explore?schemaVersion=1&panes=%7B%22a%22:%7B%22datasource%22:%22P8E80F9AEF21F6940%22,%22queries%22:%5B%7B%22refId%22:%22A%22,%22expr%22:%22%7Blevel%3D%5C%22ERROR%5C%22%7D%22%7D%5D%7D%7D&orgId=1"
