# =============================================================
# Loki 설정 - #4 Monitoring 인스턴스
# 역할: 로그 저장소 (라벨 기반 인덱싱)
# 아키텍처: 단일 바이너리 모드 (1 OCPU / 6GB ARM 저사양 환경)
# 저장소: 로컬 파일시스템 (/mnt/monitoring/loki)
# =============================================================

# ═══════════════════════════════════════════════════════════
# ① 인증 설정
# ═══════════════════════════════════════════════════════════
# false: 인증 비활성화 (내부 네트워크 전용, OCI NSG로 외부 접근 차단)
# true로 설정 시 각 요청에 X-Scope-OrgID 헤더 필수
auth_enabled: false

# ═══════════════════════════════════════════════════════════
# ② 서버 설정 (HTTP/gRPC 포트 및 성능)
# ═══════════════════════════════════════════════════════════
server:
  # HTTP API 리스닝 포트
  # Alloy가 /loki/api/v1/push로 로그 전송
  # Grafana가 쿼리 요청 전송
  http_listen_port: 3100

  # gRPC 리스닝 포트 (Loki 클러스터 통신, 단일 바이너리에서는 미사용)
  grpc_listen_port: 9095

  # gRPC 메시지 크기 제한 (저사양 환경에서 메모리 보호)
  # Alloy에서 대량의 로그를 한 번에 전송할 때 제한
  # 8MB = 8388608 bytes (기본값 4MB보다 증가)
  grpc_server_max_recv_msg_size: 8388608   # 8MB
  # 응답 메시지 크기 제한 (Grafana 쿼리 응답)
  grpc_server_max_send_msg_size: 8388608

# ═══════════════════════════════════════════════════════════
# ③ 공통 설정 (저장소, 복제, KV 스토어)
# ═══════════════════════════════════════════════════════════
common:
  # 모든 데이터 저장 경로 (docker-compose.yml의 바인드 마운트)
  # /mnt/monitoring/loki 블록 볼륨에 저장
  path_prefix: /loki

  # 저장소 백엔드 설정
  storage:
    filesystem:
      # 로그 데이터(chunks) 저장 디렉토리
      # 각 로그는 청크(배치)로 압축되어 저장
      chunks_directory: /loki/chunks
      # 알림/녹화 규칙 저장 디렉토리
      rules_directory: /loki/rules

  # 복제 팩터 (분산 시스템용)
  # 1 = 단일 복사본 (단일 인스턴스이므로 1)
  # 3 = 3개 복사본 (클러스터 환경)
  replication_factor: 1

  # KV 스토어 설정 (인덱스 저장소, 클러스터 코디네이션)
  ring:
    kvstore:
      # inmemory = 메모리 기반 KV 스토어
      # (단일 바이너리 모드이므로 메모리 사용)
      # consul, etcd 등으로 변경 가능 (분산 환경)
      store: inmemory

# ═══════════════════════════════════════════════════════════
# ④ 스키마 설정 (로그 인덱싱 방식)
# ═══════════════════════════════════════════════════════════
schema_config:
  configs:
    # 2025-01-01 이후 모든 로그에 적용할 스키마
    - from: "2025-01-01"
      # TSDB (Time Series Database) 저장소 사용
      # 로그를 시계열 데이터로 취급 (라벨별 시리즈 생성)
      store: tsdb
      # 객체 저장소 (실제 로그 본문 저장)
      object_store: filesystem
      # 스키마 버전 (v13 = 최신)
      schema: v13
      # 인덱스 설정
      index:
        # 인덱스 파일명 접두사
        prefix: index_
        # 인덱스 저장 주기 (하루 단위)
        # 매일 자정에 새 인덱스 파일 생성
        period: 24h

# ═══════════════════════════════════════════════════════════
# ⑤ Ingester 설정 (로그 수집 및 청킹)
# ═══════════════════════════════════════════════════════════
ingester:
  # 로그가 도착하지 않는 시간 동안 청크 유지 기간
  # 5분 동안 새 로그가 없으면 청크를 압축하고 저장소로 flush
  chunk_idle_period: 5m

  # 청크 보존 기간 (메모리에 유지)
  # 30초 동안 flush된 청크를 메모리에 보관
  chunk_retain_period: 30s

  # 청크 대상 크기 (ARM 메모리 절약)
  # 기본값: 1.5MB → 1MB로 축소
  # 메모리 사용량 감소, 압축률 향상
  chunk_target_size: 1048576  # 1MB

# ═══════════════════════════════════════════════════════════
# ⑥ 제한 설정 (수집 레이트, 메모리 보호)
# ═══════════════════════════════════════════════════════════
limits_config:
  # 초당 수집 가능한 최대 로그 크기 (MB)
  # 4MB/sec 이상의 로그가 오면 거부
  # broker-1/2/3, springboot 합산 고려
  ingestion_rate_mb: 4

  # 버스트 허용량 (초단위 스파이크 수용)
  # 순간적으로 6MB까지 허용하고, 이후 4MB/sec로 제한
  ingestion_burst_size_mb: 6

  # 최대 로그 스트림(라벨 조합) 개수
  # {host="broker-1", job="kafka", level="ERROR"} 같은 라벨 조합이 5000개 이상이면 거부
  max_streams_per_user: 5000

  # 단일 쿼리에서 반환 가능한 최대 로그 라인 수
  # Grafana에서 쿼리 결과를 너무 많이 가져오는 것을 방지
  max_entries_limit_per_query: 5000

  # 역사 쿼리 최대 범위 (얼마나 오래된 로그까지 조회 가능)
  # 336h = 14일 이전 로그는 조회 불가
  max_query_lookback: 336h  # 14일

  # 로그 보존 기간 (이보다 오래된 로그는 자동 삭제)
  # 336h = 14일
  # 메트릭: 15일 (prometheus.yml --storage.tsdb.retention.time=15d)
  # 로그: 14일 (여유 1일)
  retention_period: 336h    # 14일

# ═══════════════════════════════════════════════════════════
# ⑦ 압축기(Compactor) 설정 (오래된 로그 정리)
# ═══════════════════════════════════════════════════════════
compactor:
  # 압축 작업 임시 디렉토리
  working_directory: /loki/compactor

  # 압축 실행 주기 (10분마다 실행)
  # 압축: 여러 작은 청크를 하나로 병합하여 I/O 최적화
  compaction_interval: 10m

  # 보존 정책 기반 삭제 활성화
  # limits_config.retention_period에 따라 오래된 로그 삭제
  retention_enabled: true

  # 삭제 작업 지연 (2시간)
  # 마킹 후 실제 파일 삭제까지 2시간 대기 (복구 가능성)
  retention_delete_delay: 2h

  # 삭제 작업 워커 개수 (병렬 삭제)
  # 50개 워커가 동시에 파일 삭제
  retention_delete_worker_count: 50

  # 삭제 요청 저장소 (어떤 로그를 삭제할지 기록)
  delete_request_store: filesystem

# ═══════════════════════════════════════════════════════════
# ⑧ 쿼리 범위 설정 (성능 및 메모리 보호)
# ═══════════════════════════════════════════════════════════
query_range:
  # 대규모 쿼리를 여러 샤드로 분산 실행 (ARM 환경에서 비활성화)
  # false: 단일 워커가 쿼리 처리 (메모리 절약)
  parallelise_shardable_queries: false

# ═══════════════════════════════════════════════════════════
# ⑨ 분석/리포팅 설정
# ═══════════════════════════════════════════════════════════
analytics:
  # 사용 현황 리포트 비활성화
  # false: Grafana에 수집 통계 전송 안 함 (대역폭/개인정보 절약)
  reporting_enabled: false
