# =============================================================
# broker-1 (홈서버) - Alloy 에이전트
# Ubuntu x86_64 | Kafka + ZooKeeper 로그 수집 → Loki (#4)
# 기존 broker-1-docker-compose.yml에 병합하거나 별도 실행
# =============================================================

services:
  alloy:
    image: grafana/alloy:latest
    container_name: alloy-broker1
    restart: unless-stopped
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      # Kafka 로그 디렉토리 (실제 경로에 맞게 수정)
      - /opt/kafka/logs:/var/log/kafka:ro
      # ZooKeeper 로그 디렉토리
      - /opt/zookeeper/logs:/var/log/zookeeper:ro
      # 시스템 로그
      - /var/log:/var/log/host:ro
      # Docker 소켓 (Kafka가 도커로 실행되는 경우)
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - LOKI_URL=${LOKI_URL}
      - PROMETHEUS_URL=${PROMETHEUS_URL}
    # Alloy 에이전트 실행 커맨드
    command:
      - run                              # Alloy 에이전트 시작 모드
      - --storage.path=/var/lib/alloy/data  # 내부 상태/메타데이터 캐시 경로
      - /etc/alloy/config.alloy          # 로그/메트릭 수집 설정 파일
